<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Data Startup Lab</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app-shell">
    <aside class="sidebar" aria-label="차시 목록">
      <div class="brand">
        <div class="brand-mark">DS</div>
        <div>
          <h1>AI Data Startup Lab</h1>
          <p>학생 선택 중심 창업 실습</p>
        </div>
      </div>

      <label class="project-name">
        <span>프로젝트명</span>
        <input id="projectName" type="text" autocomplete="off" placeholder="예: 스마트 학습 코치">
      </label>

      <div class="progress-panel">
        <div class="progress-copy">
          <strong id="progressText">0/8 완료</strong>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <nav id="sessionNav" class="session-nav"></nav>

      <div class="sidebar-actions">
        <button id="resetBtn" class="button ghost" type="button">초기화</button>
        <button id="exportBtn" class="button dark" type="button">JSON 저장</button>
      </div>
    </aside>

    <section class="workspace">
      <header class="workspace-header">
        <div>
          <p id="sessionKicker" class="kicker">1차시</p>
          <h2 id="sessionTitle"></h2>
          <p id="sessionPurpose" class="purpose"></p>
        </div>
        <div class="header-actions">
          <button id="previewBtn" class="button ghost" type="button">결과물 보기</button>
          <button id="completeBtn" class="button primary" type="button">차시 완료</button>
        </div>
      </header>

      <div class="content-grid">
        <section class="worksheet" aria-label="워크시트 작성">
          <div class="guide-band">
            <div>
              <strong>이번 차시에서 배우는 이유</strong>
              <p id="whyText"></p>
            </div>
            <div>
              <strong>완성 기준</strong>
              <p id="doneText"></p>
            </div>
          </div>

          <div id="fieldArea" class="field-area"></div>
        </section>

        <aside class="assistant-panel" aria-label="AI 조력자">
          <div class="panel-heading">
            <span class="status-dot"></span>
            <div>
              <h3>AI 조력자</h3>
              <p>제안은 참고 자료입니다. 최종 선택은 학생이 합니다.</p>
            </div>
          </div>

          <div class="tool-grid">
            <button class="tool-button" data-tool="questions" type="button">
              <span>Q</span>
              질문 받기
            </button>
            <button class="tool-button" data-tool="evidence" type="button">
              <span>C</span>
              근거 점검
            </button>
            <button class="tool-button" data-tool="polish" type="button">
              <span>W</span>
              표현 다듬기
            </button>
            <button class="tool-button" data-tool="next" type="button">
              <span>N</span>
              다음 단계
            </button>
          </div>

          <div id="suggestionList" class="suggestion-list"></div>
        </aside>
      </div>
    </section>
  </main>

  <dialog id="previewDialog" class="preview-dialog">
    <div class="dialog-header">
      <div>
        <p class="kicker">최종 산출물 미리보기</p>
        <h2>사업계획서 요약</h2>
      </div>
      <button id="closePreviewBtn" class="icon-button" type="button" aria-label="닫기">x</button>
    </div>
    <div class="preview-layout">
      <section id="onePageSummary" class="one-page-summary"></section>
      <section>
        <h3>발표용 슬라이드 구성</h3>
        <div id="slideDeck" class="slide-deck"></div>
      </section>
    </div>
    <div class="dialog-actions">
      <button id="downloadReportBtn" class="button primary" type="button">보고서 다운로드</button>
    </div>
  </dialog>

  <script src="./app.js"></script>
</body>
</html>
